; ============================================================================
; Phase 7: Teensy 4.1 Firmware — PlatformIO Configuration
; KRS-4024HV (Red Version) PWM control revision
; ============================================================================
[env:teensy41]
platform  = teensy
board     = teensy41
framework = arduino

build_flags =
    -O2
    -DCORE_TEENSY
    -DNUM_JOINTS=17
    -DUSB_SERIAL
    -std=gnu++17

monitor_speed = 115200

; ── Single-axis test build ──
[env:teensy41_test_1axis]
platform  = teensy
board     = teensy41
framework = arduino

build_flags =
    -O2
    -DCORE_TEENSY
    -DNUM_JOINTS=17
    -DTEST_SINGLE_AXIS
    -std=gnu++17

monitor_speed = 115200
